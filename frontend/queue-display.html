<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MedVault — Patient Queue Display</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root{--bg:#0a0f1e;--surface:#111827;--surface2:#1a2235;--accent:#00d4aa;--accent2:#3b82f6;--warn:#f59e0b;--danger:#ef4444;--success:#10b981;--text:#f0f4ff;--muted:#6b7a99;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;overflow:hidden;}
  .header{padding:30px 40px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,0.07);}
  .logo{display:flex;align-items:center;gap:14px;}
  .logo-icon{width:50px;height:50px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;}
  .logo-text{font-family:'Syne',sans-serif;font-weight:800;font-size:28px;}
  .clock{font-family:'Syne',sans-serif;font-size:36px;font-weight:700;color:var(--accent);}
  .subtitle{font-size:14px;color:var(--muted);text-align:right;}
  .main{flex:1;padding:30px 40px;display:grid;grid-template-columns:1fr 1fr;gap:24px;overflow:hidden;}
  .col{display:flex;flex-direction:column;}
  .col-title{font-family:'Syne',sans-serif;font-weight:700;font-size:18px;margin-bottom:16px;padding-bottom:10px;border-bottom:2px solid rgba(255,255,255,0.07);display:flex;align-items:center;gap:10px;}
  .col-title .dot{width:10px;height:10px;border-radius:50%;}
  .queue-list{flex:1;overflow:hidden;display:flex;flex-direction:column;gap:10px;}
  .q-item{display:flex;align-items:center;gap:16px;padding:16px 20px;background:var(--surface);border:1px solid rgba(255,255,255,0.07);border-radius:14px;animation:fadeIn 0.3s ease;}
  .q-item.active{border-color:var(--accent);background:rgba(0,212,170,0.06);}
  .q-num{font-family:'Syne',sans-serif;font-weight:800;font-size:28px;color:var(--accent);min-width:60px;}
  .q-info{flex:1;}
  .q-name{font-size:18px;font-weight:500;}
  .q-doctor{font-size:13px;color:var(--muted);margin-top:2px;}
  .q-time{font-size:14px;color:var(--muted);font-family:'Syne',sans-serif;}
  .q-status{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;text-transform:uppercase;}
  .q-status.in_progress{background:rgba(0,212,170,0.15);color:var(--accent);}
  .q-status.checked_in{background:rgba(59,130,246,0.15);color:var(--accent2);}
  .q-status.scheduled{background:rgba(245,158,11,0.12);color:var(--warn);}
  .empty{text-align:center;padding:40px;color:var(--muted);font-size:16px;}
  .footer{padding:16px 40px;text-align:center;font-size:12px;color:var(--muted);border-top:1px solid rgba(255,255,255,0.07);}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

  /* ========================================================= */
  /* MOBILE / TABLET RESPONSIVE ENHANCEMENTS (added)            */
  /* ========================================================= */
  html{-webkit-text-size-adjust:100%;}
  @media(max-width:900px){
    body{overflow-y:auto;overflow-x:hidden;}
    .header{padding:18px 20px;flex-wrap:wrap;gap:10px;}
    .logo-text{font-size:20px;}
    .logo-icon{width:38px;height:38px;font-size:19px;}
    .clock{font-size:26px;}
    .main{grid-template-columns:1fr;padding:16px;gap:18px;overflow:visible;}
    .q-item{padding:12px 14px;gap:10px;flex-wrap:wrap;}
    .q-name{font-size:15px;}
    .q-num{font-size:22px;min-width:44px;}
  }
  @media(max-width:480px){
    .clock{font-size:20px;}
    .subtitle{font-size:11px;}
    .q-status{padding:4px 10px;font-size:10px;}
  }
</style>
</head>
<body>
  <div class="header">
    <div class="logo"><div class="logo-icon">💊</div><div><div class="logo-text">MedVault</div><div style="font-size:12px;color:var(--muted)">Patient Queue</div></div></div>
    <div><div class="clock" id="clock">--:--</div><div class="subtitle" id="dateDisplay">Loading…</div></div>
  </div>
  <div class="main">
    <div class="col">
      <div class="col-title"><div class="dot" style="background:var(--accent)"></div>Now Serving & Waiting</div>
      <div class="queue-list" id="activeQueue"><div class="empty">Loading queue…</div></div>
    </div>
    <div class="col">
      <div class="col-title"><div class="dot" style="background:var(--accent2)"></div>Upcoming</div>
      <div class="queue-list" id="upcomingQueue"><div class="empty">Loading…</div></div>
    </div>
  </div>
  <div class="footer">MedVault Healthcare ERP — Queue refreshes automatically every 30 seconds</div>

<script>
const API_BASE = localStorage.getItem('mv_api_base') || '';
const TOKEN    = localStorage.getItem('mv_token') || '';

function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  document.getElementById('dateDisplay').textContent = now.toLocaleDateString('en-UG', {weekday:'long', day:'numeric', month:'long', year:'numeric'});
}
updateClock();
setInterval(updateClock, 1000);

async function loadQueue() {
  try {
    const res = await fetch(API_BASE + '/api/clinic/queue', {
      headers: { 'Authorization': 'Bearer ' + TOKEN }
    });
    if (!res.ok) return;
    const data = await res.json();
    const queue = data.queue || [];

    const active = queue.filter(a => a.status === 'in_progress' || a.status === 'checked_in');
    const upcoming = queue.filter(a => a.status === 'scheduled');

    const activeEl = document.getElementById('activeQueue');
    const upcomingEl = document.getElementById('upcomingQueue');

    if (active.length) {
      activeEl.innerHTML = active.map((a, i) => `
        <div class="q-item ${a.status === 'in_progress' ? 'active' : ''}">
          <div class="q-num">${String(i + 1).padStart(2, '0')}</div>
          <div class="q-info">
            <div class="q-name">${a.patient_name || 'Patient'}</div>
            <div class="q-doctor">Dr. ${a.doctor_name || '—'}</div>
          </div>
          <div class="q-time">${new Date(a.scheduled_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
          <div class="q-status ${a.status}">${a.status === 'in_progress' ? 'NOW SERVING' : 'WAITING'}</div>
        </div>`).join('');
    } else {
      activeEl.innerHTML = '<div class="empty">No patients currently being served</div>';
    }

    if (upcoming.length) {
      upcomingEl.innerHTML = upcoming.slice(0, 8).map((a, i) => `
        <div class="q-item">
          <div class="q-num" style="color:var(--muted)">${String(active.length + i + 1).padStart(2, '0')}</div>
          <div class="q-info">
            <div class="q-name">${a.patient_name || 'Patient'}</div>
            <div class="q-doctor">Dr. ${a.doctor_name || '—'}</div>
          </div>
          <div class="q-time">${new Date(a.scheduled_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
          <div class="q-status scheduled">SCHEDULED</div>
        </div>`).join('');
    } else {
      upcomingEl.innerHTML = '<div class="empty">No upcoming appointments</div>';
    }
  } catch (e) {
    console.error('Queue load error:', e);
  }
}

loadQueue();
setInterval(loadQueue, 30000); // Refresh every 30 seconds
</script>
</body>
</html>
