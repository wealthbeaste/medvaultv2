<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Log In — MedVault</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#07090f;--s1:#0d1117;--s2:#131920;--border:rgba(255,255,255,0.07);--accent:#00e5b0;--accent2:#3b82f6;--text:#eef2ff;--muted:#6b7a99;--font:'Outfit',sans-serif;--display:'Syne',sans-serif;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}
a{text-decoration:none;color:inherit;}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:50;padding:0 40px;height:64px;display:flex;align-items:center;justify-content:space-between;background:rgba(7,9,15,0.85);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);}
.nav-logo{display:flex;align-items:center;gap:10px;cursor:pointer;}
.nav-logo-icon{width:34px;height:34px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;box-shadow:0 0 16px rgba(0,229,176,0.25);}
.nav-logo-text{font-family:var(--display);font-weight:800;font-size:19px;letter-spacing:-0.5px;}
.nav-right{display:flex;align-items:center;gap:10px;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 20px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all 0.2s;font-family:var(--font);}
.btn-ghost{background:transparent;color:var(--text);border:1px solid var(--border);}
.btn-ghost:hover{background:var(--s2);}
.btn-accent{background:var(--accent);color:#000;}
.btn-accent:hover{filter:brightness(1.1);transform:translateY(-1px);}

/* MAIN */
main{flex:1;display:flex;align-items:center;justify-content:center;padding:100px 20px 60px;position:relative;overflow:hidden;}
main::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 50% at 50% 30%,rgba(0,229,176,0.07) 0%,transparent 65%);pointer-events:none;}

/* CARD */
.login-card{width:100%;max-width:440px;position:relative;z-index:1;animation:fadeUp 0.45s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}

.card-header{text-align:center;margin-bottom:32px;}
.card-icon{width:56px;height:56px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 18px;box-shadow:0 0 28px rgba(0,229,176,0.2);}
.card-title{font-family:var(--display);font-weight:800;font-size:28px;letter-spacing:-1px;margin-bottom:6px;}
.card-sub{font-size:14px;color:var(--muted);line-height:1.5;}

.card-body{background:var(--s1);border:1px solid var(--border);border-radius:18px;padding:30px;}

/* FORM */
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:16px;}
.fl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;}
.fi-wrap{position:relative;}
.fi{background:var(--s2);border:1px solid var(--border);border-radius:9px;padding:12px 14px;color:var(--text);font-family:var(--font);font-size:14px;outline:none;transition:border-color 0.2s;width:100%;}
.fi:focus{border-color:rgba(0,229,176,0.4);}
.fi::placeholder{color:var(--muted);}
.fi.error{border-color:rgba(239,68,68,0.5);}

.toggle-pw{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:2px;transition:color 0.2s;}
.toggle-pw:hover{color:var(--text);}

/* ERROR BANNER */
.error-banner{display:none;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.25);border-radius:10px;padding:12px 14px;margin-bottom:18px;font-size:13px;color:#fca5a5;line-height:1.5;}
.error-banner.show{display:flex;align-items:flex-start;gap:8px;}
.error-banner-icon{flex-shrink:0;margin-top:1px;}

/* SUBMIT */
.submit-btn{width:100%;padding:14px;border-radius:11px;background:linear-gradient(135deg,var(--accent),#00c49a);color:#000;font-family:var(--display);font-weight:800;font-size:16px;border:none;cursor:pointer;transition:all 0.2s;margin-top:4px;letter-spacing:-0.3px;}
.submit-btn:hover:not(:disabled){filter:brightness(1.08);transform:translateY(-1px);box-shadow:0 8px 24px rgba(0,229,176,0.25);}
.submit-btn:disabled{opacity:0.65;cursor:not-allowed;transform:none;}

/* FOOTER LINKS */
.card-footer{text-align:center;margin-top:20px;font-size:13px;color:var(--muted);}
.card-footer a{color:var(--accent);font-weight:600;transition:opacity 0.2s;}
.card-footer a:hover{opacity:0.8;}
.divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--muted);font-size:12px;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}

/* FOOTER */
footer{padding:24px 40px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
.footer-logo{display:flex;align-items:center;gap:8px;}
.footer-logo-icon{width:26px;height:26px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;}
.footer-copy{font-size:12px;color:var(--muted);}

/* ── MOBILE RESPONSIVE ── */
@media(max-width:600px){
  nav{padding:0 16px;height:56px;}
  .btn-accent{display:none;} /* hide 'Start Free Trial' — keeps nav clean */
  .btn-ghost{padding:7px 12px;font-size:12px;}
  main{padding:80px 16px 40px;}
  .card-body{padding:22px 18px;}
  .card-title{font-size:22px;}
  .submit-btn{font-size:15px;padding:13px;}
  footer{padding:16px;flex-direction:column;align-items:flex-start;gap:6px;}
  .fg input,.fg select,button{min-height:44px;font-size:16px;}
}
@media(max-width:380px){
  .card-title{font-size:19px;}
  .card-body{padding:18px 14px;}
}
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-logo" onclick="window.location.href='index.html'">
    <div class="nav-logo-icon">💊</div>
    <div class="nav-logo-text">MedVault</div>
  </div>
  <div class="nav-right">
    <button class="btn btn-ghost" onclick="window.location.href='index.html'">← Back to Home</button>
    <button class="btn btn-accent" onclick="window.location.href='index.html#signup'">Start Free Trial →</button>
  </div>
</nav>

<!-- MAIN -->
<main>
  <div class="login-card">

    <div class="card-header">
      <div class="card-icon">💊</div>
      <div class="card-title" id="cardTitle">Welcome back</div>
      <div class="card-sub" id="cardSub">Sign in to your MedVault pharmacy dashboard</div>
    </div>

    <div class="card-body" id="loginPanel">

      <!-- Error banner -->
      <div class="error-banner" id="errorBanner">
        <span class="error-banner-icon">⚠️</span>
        <span id="errorText">Invalid email or password. Please try again.</span>
      </div>

      <!-- Email -->
      <div class="fg">
        <label class="fl" for="loginEmail">Email Address</label>
        <div class="fi-wrap">
          <input class="fi" id="loginEmail" type="email" placeholder="your@email.com" autocomplete="email" onkeydown="handleKey(event)"/>
        </div>
      </div>

      <!-- Password -->
      <div class="fg">
        <label class="fl" for="loginPass">Password</label>
        <div class="fi-wrap">
          <input class="fi" id="loginPass" type="password" placeholder="Your password" autocomplete="current-password" onkeydown="handleKey(event)"/>
          <button class="toggle-pw" type="button" onclick="togglePassword()" id="toggleBtn" title="Show/hide password">👁</button>
        </div>
      </div>

      <!-- Submit -->
      <button class="submit-btn" id="loginBtn" onclick="doLogin()">🔐 Sign In to Dashboard</button>

      <div style="text-align:center;margin-top:10px">
        <a href="#" onclick="showForgotPanel();return false" style="color:var(--muted);font-size:12.5px;text-decoration:underline">Forgot password?</a>
      </div>

      <div class="divider">or</div>

      <div style="text-align:center;font-size:13px;color:var(--muted)">
        Don't have an account? <a href="index.html#signup" style="color:var(--accent);font-weight:600">Start your free 14-day trial →</a>
      </div>

    </div>

    <!-- FORGOT PASSWORD PANEL (hidden by default) -->
    <div class="card-body" id="forgotPanel" style="display:none">
      <div class="fg">
        <label class="fl" style="margin-bottom:10px;display:block">Enter the email on your MedVault account and we'll send you a link to reset your password.</label>
        <div class="fi-wrap">
          <input class="fi" id="forgotEmail" type="email" placeholder="your@email.com" onkeydown="if(event.key==='Enter')submitForgotPassword()"/>
        </div>
      </div>
      <div id="forgotMsg" style="font-size:12.5px;color:var(--muted);margin-bottom:14px;display:none"></div>
      <button class="submit-btn" id="forgotBtn" onclick="submitForgotPassword()">📧 Send reset link</button>
      <div style="text-align:center;margin-top:12px">
        <a href="#" onclick="showLoginPanel();return false" style="color:var(--muted);font-size:12.5px;text-decoration:underline">← Back to sign in</a>
      </div>
    </div>

    <!-- RESET PASSWORD PANEL (shown when arriving via ?resetToken=...) -->
    <div class="card-body" id="resetPanel" style="display:none">
      <div class="fg">
        <label class="fl" for="newPass1">New password</label>
        <div class="fi-wrap">
          <input class="fi" id="newPass1" type="password" placeholder="At least 6 characters" autocomplete="new-password"/>
        </div>
      </div>
      <div class="fg">
        <label class="fl" for="newPass2">Confirm new password</label>
        <div class="fi-wrap">
          <input class="fi" id="newPass2" type="password" placeholder="Retype your new password" autocomplete="new-password" onkeydown="if(event.key==='Enter')submitResetPassword()"/>
        </div>
      </div>
      <div id="resetMsg" style="font-size:12.5px;color:var(--muted);margin-bottom:14px;display:none"></div>
      <button class="submit-btn" id="resetBtn" onclick="submitResetPassword()">🔑 Set new password</button>
    </div>

    <div class="card-footer">
      <a href="index.html">← Back to home</a>
      &nbsp;·&nbsp;
      <a href="mailto:support@medvault.ug">Need help?</a>
    </div>

  </div>
</main>

<!-- FOOTER -->
<footer>
  <div class="footer-logo">
    <div class="footer-logo-icon">💊</div>
    <div style="font-family:var(--display);font-weight:800;font-size:15px">MedVault</div>
  </div>
  <div class="footer-copy">© 2026 MedVault Uganda. NDA Registered Platform.</div>
</footer>

<script>
// ── API base URL: production Railway backend or local dev server ──
const API_BASE = (
  window.MEDVAULT_API_BASE && typeof window.MEDVAULT_API_BASE === 'string'
) ? window.MEDVAULT_API_BASE.replace(/\/+$/, '')
  : (
    window.location.hostname === 'localhost' ||
    window.location.hostname === '127.0.0.1'
  ) ? 'http://localhost:4000'
    : 'https://medvaultv2-production.up.railway.app';

function togglePassword() {
  const input = document.getElementById('loginPass');
  const btn   = document.getElementById('toggleBtn');
  if (input.type === 'password') {
    input.type = 'text';
    btn.textContent = '🙈';
  } else {
    input.type = 'password';
    btn.textContent = '👁';
  }
}

// ── Panel switching: sign in / forgot password / set new password ──
function showLoginPanel() {
  document.getElementById('loginPanel').style.display   = '';
  document.getElementById('forgotPanel').style.display   = 'none';
  document.getElementById('resetPanel').style.display    = 'none';
  document.getElementById('cardTitle').textContent = 'Welcome back';
  document.getElementById('cardSub').textContent   = 'Sign in to your MedVault pharmacy dashboard';
}

function showForgotPanel() {
  document.getElementById('loginPanel').style.display  = 'none';
  document.getElementById('forgotPanel').style.display  = '';
  document.getElementById('resetPanel').style.display   = 'none';
  document.getElementById('cardTitle').textContent = 'Reset your password';
  document.getElementById('cardSub').textContent   = "We'll email you a secure link";
  document.getElementById('forgotEmail').focus();
}

function showResetPanel() {
  document.getElementById('loginPanel').style.display  = 'none';
  document.getElementById('forgotPanel').style.display  = 'none';
  document.getElementById('resetPanel').style.display   = '';
  document.getElementById('cardTitle').textContent = 'Choose a new password';
  document.getElementById('cardSub').textContent   = 'This link is single-use and expires in 1 hour';
}

function setPanelMsg(elId, msg, isError) {
  const el = document.getElementById(elId);
  el.textContent = msg;
  el.style.color = isError ? '#ef4444' : 'var(--muted)';
  el.style.display = msg ? 'block' : 'none';
}

async function submitForgotPassword() {
  const email = document.getElementById('forgotEmail').value.trim();
  if (!email) { setPanelMsg('forgotMsg', 'Please enter your email address.', true); return; }
  const btn = document.getElementById('forgotBtn');
  btn.disabled = true; btn.textContent = '⏳ Sending…';
  setPanelMsg('forgotMsg', '', false);
  try {
    const r = await fetch(API_BASE + '/api/auth/forgot-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email }),
    });
    const data = await r.json().catch(() => ({}));
    // Backend always returns a generic success message here regardless of
    // whether the email exists — that's intentional (no account
    // enumeration), so we always show it as success too.
    setPanelMsg('forgotMsg', data.message || 'If an account exists with that email, a reset link has been sent. Check your inbox (and spam folder).', false);
    btn.textContent = '✅ Link sent';
  } catch (e) {
    setPanelMsg('forgotMsg', 'Network error — please try again, or contact your MedVault admin for a manual reset.', true);
    btn.disabled = false; btn.textContent = '📧 Send reset link';
  }
}

async function submitResetPassword() {
  const p1 = document.getElementById('newPass1').value;
  const p2 = document.getElementById('newPass2').value;
  if (!p1 || p1.length < 6) { setPanelMsg('resetMsg', 'Password must be at least 6 characters.', true); return; }
  if (p1 !== p2) { setPanelMsg('resetMsg', 'Passwords do not match.', true); return; }
  const btn = document.getElementById('resetBtn');
  btn.disabled = true; btn.textContent = '⏳ Saving…';
  try {
    const r = await fetch(API_BASE + '/api/auth/reset-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: window._resetToken, password: p1 }),
    });
    const data = await r.json().catch(() => ({}));
    if (!r.ok) {
      setPanelMsg('resetMsg', data.error || 'This link is invalid or has expired. Please request a new one.', true);
      btn.disabled = false; btn.textContent = '🔑 Set new password';
      return;
    }
    setPanelMsg('resetMsg', '✅ Password updated! Redirecting to sign in…', false);
    setTimeout(() => {
      window.history.replaceState({}, '', 'login.html');
      showLoginPanel();
      btn.disabled = false; btn.textContent = '🔑 Set new password';
    }, 1500);
  } catch (e) {
    setPanelMsg('resetMsg', 'Network error — please try again.', true);
    btn.disabled = false; btn.textContent = '🔑 Set new password';
  }
}

// Arriving from the emailed reset link? Jump straight to the reset panel.
(function checkForResetToken() {
  const params = new URLSearchParams(window.location.search);
  const token = params.get('resetToken');
  if (token) {
    window._resetToken = token;
    showResetPanel();
  }
})();

function handleKey(e) {
  if (e.key === 'Enter') doLogin();
}

function showError(msg) {
  const banner = document.getElementById('errorBanner');
  document.getElementById('errorText').textContent = msg;
  banner.classList.add('show');
}

function hideError() {
  document.getElementById('errorBanner').classList.remove('show');
}

function setLoading(loading) {
  const btn = document.getElementById('loginBtn');
  if (loading) {
    btn.textContent = '⏳ Signing in…';
    btn.disabled = true;
  } else {
    btn.textContent = '🔐 Sign In to Dashboard';
    btn.disabled = false;
  }
}

async function doLogin() {
  hideError();

  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPass').value;

  // Basic validation
  if (!email) {
    document.getElementById('loginEmail').classList.add('error');
    showError('Please enter your email address.');
    document.getElementById('loginEmail').focus();
    return;
  }
  if (!pass) {
    document.getElementById('loginPass').classList.add('error');
    showError('Please enter your password.');
    document.getElementById('loginPass').focus();
    return;
  }

  // Clear error styling
  document.getElementById('loginEmail').classList.remove('error');
  document.getElementById('loginPass').classList.remove('error');

  setLoading(true);

  // Helper: fetch with an explicit timeout, since the Railway backend can hang
  // mid-request (cold starts, container restarts) — we don't want users to wait 60s.
  async function fetchLogin(timeoutMs) {
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), timeoutMs);
    try {
      return await fetch(API_BASE + '/api/auth/login', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Accept': 'application/json',
        },
        body: JSON.stringify({ email, password: pass }),
        signal: ctrl.signal,
      });
    } finally {
      clearTimeout(timer);
    }
  }

  let res;
  let networkErr = null;
  // Try twice — first attempt may hit a sleeping/cold-starting backend.
  for (let attempt = 1; attempt <= 2; attempt++) {
    try {
      if (attempt === 2) {
        document.getElementById('loginBtn').textContent = '⏳ Retrying…';
      }
      res = await fetchLogin(attempt === 1 ? 12000 : 25000);
      networkErr = null;
      break;
    } catch (e) {
      networkErr = e;
      if (attempt === 1) await new Promise(r => setTimeout(r, 800));
    }
  }

  if (networkErr) {
    setLoading(false);
    // Network-level failure — fall back to a cached session if it matches this email
    const cachedToken = localStorage.getItem('mv_token');
    const cachedUser  = localStorage.getItem('mv_user');
    if (cachedToken && cachedUser) {
      try {
        const user = JSON.parse(cachedUser);
        if (user.email && user.email.toLowerCase() === email.toLowerCase()) {
          window.location.href = 'app.html';
          return;
        }
      } catch (_) {}
    }
    if (networkErr.name === 'AbortError') {
      showError('⏱ The server is taking too long to respond — it may be restarting. Please wait a moment and try again.');
    } else {
      showError('🌐 Cannot reach the server. Check your internet connection or try again shortly.');
    }
    return;
  }

  // Always re-enable the button after this point (success redirects away, errors need retry)
  setLoading(false);

  try {
    let data;
    try {
      data = await res.json();
    } catch (_) {
      throw new Error('SERVER_PARSE_ERROR');
    }

    if (data.token) {
      // Keep button disabled while redirecting so user doesn't double-click
      const btn = document.getElementById('loginBtn');
      btn.textContent = '✅ Signing in…';
      btn.disabled = true;
      localStorage.setItem('mv_token', data.token);
      localStorage.setItem('mv_user', JSON.stringify(data.user));
      window.location.href = 'app.html';
    } else {
      if (res.status === 401 || res.status === 403) {
        showError('❌ Incorrect email or password. Please try again.');
      } else if (res.status >= 500) {
        showError('🔧 The server encountered an error. Please try again in a moment.');
      } else {
        const msg = data.error || data.message || 'Invalid email or password. Please try again.';
        showError(msg);
      }
      document.getElementById('loginPass').value = '';
      document.getElementById('loginPass').focus();
    }
  } catch (e) {
    if (e.message === 'SERVER_PARSE_ERROR') {
      showError('🔧 Unexpected response from the server. Please try again.');
    } else {
      showError('⚠️ Something went wrong. Please refresh the page and try again.');
    }
  }
}
</script>
</body>
</html>
