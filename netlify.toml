# Netlify configuration
# This file tells Netlify exactly how to serve MedVault

[build]
  publish = "frontend"
  command = "echo 'No build needed - pure HTML'"

# -- URL redirects --
# Makes URLs cleaner - /app instead of /app.html
[[redirects]]
  from = "/app"
  to = "/app.html"
  status = 200

[[redirects]]
  from = "/order"
  to = "/order.html"
  status = 200

[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 200

[[redirects]]
  from = "/ai"
  to = "/ai.html"
  status = 200

[[redirects]]
  from = "/suppliers"
  to = "/suppliers.html"
  status = 200

# -- Security headers --
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# -- Cache static assets --
[[headers]]
  for = "/service-worker.js"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600"